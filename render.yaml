services:
  - type: web
    name: nexus-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: npm ci --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/ready
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: TRUST_PROXY
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "300"
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_DOCUMENT_FOLDER
        value: nexus/student-documents
      - key: MAX_DOCUMENT_UPLOAD_MB
        value: "10"
