services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["mongod", "--bind_ip_all"]
    environment:
      MONGO_INITDB_DATABASE: nexus-student-management
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file:
      - path: .env.production
        required: false
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/nexus-student-management
      TRUST_PROXY: "true"
      CLIENT_ORIGIN: https://nexus.example.com
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "5000"

  frontend:
    build:
      context: .
      target: frontend
    restart: unless-stopped
    depends_on:
      - api
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-web:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

  certbot:
    image: certbot/certbot
    profiles: ["tls"]
    volumes:
      - certbot-web:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@example.com --agree-tos --no-eff-email -d nexus.example.com -d api.nexus.example.com

  backup:
    build:
      context: .
      target: api
    profiles: ["backup"]
    env_file:
      - path: .env.production
        required: false
    environment:
      MONGODB_URI: mongodb://mongo:27017/nexus-student-management
      BACKUP_DIR: /backups
    volumes:
      - ./backups:/backups
    depends_on:
      mongo:
        condition: service_healthy
    command: ["npm", "run", "backup:mongodb"]

volumes:
  mongo-data:
  certbot-web:
  letsencrypt:
